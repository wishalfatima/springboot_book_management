<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Publisher</title>
</head>
<body>
<h1>Add Publisher</h1>

<form th:action="@{/publishers/save}" th:object="${publisher}" method="post">
    <!-- Hidden id field for edit support -->
    <input type="hidden" th:field="*{id}" />

    <label for="name">Name:</label>
    <input type="text" id="name" th:field="*{name}" />
    <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
    <br/>

    <label for="address">Address:</label>
    <input type="text" id="address" th:field="*{address}" />
    <div th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
    <br/>

    <button type="submit">Save Publisher</button>
</form>

<br/>
<a th:href="@{/publishers}">Back to Publishers List</a>

</body>
</html>
