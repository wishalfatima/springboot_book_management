<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Publishers List</title>
</head>
<body>
<h1>Publishers</h1>
<table border="1">
    <thead>
    <tr>
        <th>Name</th>
        <th>Address</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="publisher : ${publishers}">
        <td th:text="${publisher.name}"></td>
        <td th:text="${publisher.address}"></td>
        <td>
            <a th:href="@{/publishers/edit/{id}(id=${publisher.id})}">Edit</a>
            <a th:href="@{/publishers/delete/{id}(id=${publisher.id})}">Delete</a>
        </td>
    </tr>
    </tbody>
</table>
<a href="/publishers/add">Add New Publisher</a>
<br/>
<a th:href="@{/}">Back to Home</a>
</body>
</html>
