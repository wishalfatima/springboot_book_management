<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Genre Form</title></head>
<body>
<h2 th:text="${genre.id == null} ? 'Add Genre' : 'Edit Genre'"></h2>

<form th:action="@{/genres/save}" th:object="${genre}" method="post">
  <input type="hidden" th:field="*{id}" />
  <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:red"></div>

  <label>Name:</label>
  <input type="text" th:field="*{name}" placeholder="Genre name" required />
  <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>

  <br><br>
  <button type="submit">Save</button>
</form>

<a th:href="@{/genres}">Back to List</a>
</body>
</html>
